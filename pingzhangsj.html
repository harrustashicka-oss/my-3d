<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建筑搭建演示</title>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js">
  </script>
  <style>
    html, body { margin: 0; height: 100%; }
    model-viewer {
      width: 100%; height: 100%;
      /* 深色背景让白色模型凸显 */
      background: #2a2a2a;
      /* 增强边缘对比 */
      --poster-color: #2a2a2a;
    }
    #tip {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
      border-radius: 20px; font-family: sans-serif; font-size: 14px;
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="tip">点击屏幕：搭建下一步</div>
  <model-viewer
    id="viewer"
    camera-controls
    shadow-intensity="1.5"
    shadow-softness="0.8"
    exposure="1.2"
    environment-image="neutral"
    touch-action="pan-y"
    min-camera-orbit="auto auto 5%"
    max-camera-orbit="auto auto 200%">
  </model-viewer>
  <script>
const viewer = document.getElementById('viewer');
const tip = document.getElementById('tip');
const steps = ['01.glb', '02.glb', '03.glb', '04.glb', '05.glb'];
const labels = ['底座', '加柱子', '加墙体', '加房顶', '完整建筑'];
let index = 0;
viewer.src = steps[index];
tip.textContent = labels[index] + '（点击继续）';

let pointerDownTime = 0;
let pointerMoved = false;

viewer.addEventListener('pointerdown', () => {
  pointerDownTime = Date.now();
  pointerMoved = false;
});

viewer.addEventListener('pointermove', () => {
  pointerMoved = true;
});

viewer.addEventListener('pointerup', () => {
  const duration = Date.now() - pointerDownTime;
  if (duration < 300 && !pointerMoved) {
    if (index < steps.length - 1) {
      index++;
      viewer.src = steps[index];
      tip.textContent = labels[index] + (index === steps.length - 1 ? '（已完成，点击重来）' : '（点击继续）');
    } else {
      index = 0;
      viewer.src = steps[index];
      tip.textContent = labels[index] + '（点击继续）';
    }
  }
});
  </script>
</body>
</html>
