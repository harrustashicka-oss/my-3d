<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>斗拱搭建演示</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#2a2a2a;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
  #canvas{display:block;width:100%;height:100%;touch-action:none}
  .title-bar{position:absolute;top:0;left:0;right:0;padding:18px 22px 30px;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);color:#fff;pointer-events:none;z-index:5;
    transition:opacity .3s ease}
  .title-bar.hide{opacity:0}
  .title-main{font-size:26px;font-weight:600;letter-spacing:1px}
  .title-sub{font-size:15px;opacity:.75;margin-top:6px;letter-spacing:1px}
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:18px 22px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;z-index:5}
  .tip{font-size:14px;margin-bottom:12px;opacity:.95}
  .progress{display:flex;gap:6px}
  .dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.25);transition:background .4s}
  .dot.active{background:#ffd24a}
  .dot.done{background:rgba(255,210,74,.55)}
  .controls{position:absolute;top:16px;right:14px;z-index:6;display:flex;gap:10px}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.18);
    color:#fff;backdrop-filter:blur(6px);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .btn:active{background:rgba(255,255,255,.32)}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#fff;z-index:10;text-align:center;transition:opacity .4s}
  .loading.hide{opacity:0;pointer-events:none}
  .loading .bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:12px;overflow:hidden}
  .loading .bar-fill{height:100%;width:0%;background:#ffd24a;border-radius:2px;transition:width .3s}
  .enter-mask{position:absolute;inset:0;z-index:20;background:#2a2a2a;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;
    transition:opacity .6s}
  .enter-mask.hide{opacity:0;pointer-events:none}
  .enter-mask .play{width:80px;height:80px;border-radius:50%;
    border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;
    justify-content:center;font-size:30px;padding-left:6px;margin:0 auto}
  .enter-mask .label{margin-top:18px;font-size:15px;opacity:.8;text-align:center}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="title-bar" id="titleBar">
  <div class="title-main" id="titleMain">墨香斗影</div>
  <div class="title-sub" id="titleSub">第 1 / 8 步</div>
</div>
<div class="controls">
  <button class="btn" id="muteBtn" title="音乐开关">🔊</button>
  <button class="btn" id="restartBtn" title="重新播放">▶</button>
</div>
<div class="bottom-bar">
  <div class="tip" id="tip">点击屏幕搭建下一步</div>
  <div class="progress" id="progress"></div>
</div>
<div class="loading" id="loading">
  <div id="loadTxt">加载中...</div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>
<div class="enter-mask" id="enterMask" style="display:none">
  <div>
    <div class="play">▶</div>
    <div class="label">点击进入</div>
  </div>
</div>

<audio id="bgm" loop preload="auto" src="太湖石影_Part1.mp3"></audio>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ── 搭建步骤标签（8步） ── */
const labels = ['G1','G2','G3','04','05','061','M5','M6'];
const titlePrefix = '墨香斗影';

/* ── 飞出构件对应的艺术术语 ── */
const componentArtNames = {
  'M1': '绞转',
  'M2': '和缓',
  'M3': '浓淡',
  'M4': '藏露',
  'M5': '翻折',
  'M6': '顿挫'
};

const titleBar = document.getElementById('titleBar'),
      titleMain = document.getElementById('titleMain'),
      titleSub = document.getElementById('titleSub'),
      tip = document.getElementById('tip'),
      progress = document.getElementById('progress'),
      loading = document.getElementById('loading'),
      loadTxt = document.getElementById('loadTxt'),
      barFill = document.getElementById('barFill'),
      enterMask = document.getElementById('enterMask'),
      bgm = document.getElementById('bgm'),
      muteBtn = document.getElementById('muteBtn'),
      restartBtn = document.getElementById('restartBtn');

labels.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  progress.appendChild(d);
});

/* ── Three.js 基础场景 ── */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x2a2a2a);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.radius = 8;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.88;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100000);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.bias = -0.0005;
dirLight.shadow.radius = 55;
dirLight.shadow.blurSamples = 80;
scene.add(dirLight);
scene.add(dirLight.target);

const ambLight = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambLight);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.enablePan = true;
controls.panSpeed = 0.8;

const loadingManager = new THREE.LoadingManager();
loadingManager.onProgress = (url, loaded, total) => {
  const pct = Math.round(loaded / total * 100);
  barFill.style.width = pct + '%';
  loadTxt.textContent = '加载中 ' + pct + '%';
};

const loader = new GLTFLoader(loadingManager);
const stepMeshes = labels.map(() => []);

/* ── 工具函数 ── */
function setOpacity(mesh, val) {
  const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
  mats.forEach(m => { if (m.opacity !== undefined) m.opacity = val; });
  // 同步更新边缘线透明度
  mesh.children.forEach(c => {
    if (c.isLineSegments && c.material && c.material.opacity !== undefined) {
      c.material.opacity = val;
    }
  });
}
function showMesh(mesh) { mesh.visible = true; }
function hideMesh(mesh) { mesh.visible = false; mesh.castShadow = false; }

/* ── 状态变量 ── */
let index = 0, busy = false;
let yellowPhase = 'none';   // 'none' | 'flying-out' | 'out' | 'flying-back' | 'done'
let currentYellowIndex = 0;
let maxDim = 0;
let yellowMeshes = [];      // 飞出构件列表 [{object, origPos, worldY}]
let flyDirections = [];      // 每个飞出构件的方向 {dx, dy, dz}
let entered = false;

/* ══════════════════════════════════════════
   模型初始化
   ══════════════════════════════════════════ */
async function init() {
  const gltf = await loader.loadAsync('models/dougong.gltf');
  const model = gltf.scene;

  /* ── 重构场景层级：将M1、M2从G1中分离为独立顶层组 ──
       原结构：G1 → [M2, M1, 0]
       新结构：G1 → [0], M1, M2 均为model直接子节点 */
  const allNodes = [];
  model.traverse(child => { allNodes.push(child); });

  const g1 = allNodes.find(n => n.name === 'G1');
  const m1Node = allNodes.find(n => n.name === 'M1' && !n.isMesh);
  const m2Node = allNodes.find(n => n.name === 'M2' && !n.isMesh);

  if (g1 && m1Node && m2Node) {
    g1.remove(m1Node, m2Node);
    model.add(m1Node);
    model.add(m2Node);
    console.log('已重构场景：M1、M2 从 G1 分离为独立顶层组');
  }

  /* ─ 重新收集节点（层级已改变）── */
  allNodes.length = 0;
  model.traverse(child => { allNodes.push(child); });

  /* ── 按名称查找8个构件组 ── */
  const groups = [];
  for (const name of labels) {
    const found = allNodes.find(n => n.name === name && !n.isMesh);
    if (found) {
      groups.push(found);
    } else {
      const prefix = name;
      const fallback = allNodes.find(n => n.name && n.name.startsWith(prefix) && n.children.length > 0 && !n.isMesh);
      if (fallback) {
        groups.push(fallback);
        console.warn('标签 "'+name+'" 未精确匹配，使用前缀回退: '+fallback.name);
      } else {
        console.error('标签 "'+name+'" 未找到任何匹配节点！');
      }
    }
  }

  console.log('找到构件组:', groups.map(g => g.name));
  console.log('各组子节点:', groups.map(g => g.name + '→[' + g.children.map(c=>c.name).join(',') + ']'));

  /* ── 调试：输出所有非mesh节点名称 ── */
  console.log('所有Group节点:', allNodes.filter(n=>!n.isMesh && n.children && n.children.length>0).map(n=>n.name));

  /* ── 初始化每个步骤的网格体 ── */
  groups.forEach((group, stepIndex) => {
    group.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (Array.isArray(child.material)) {
          child.material = child.material.map(m => m.clone());
        } else {
          child.material = child.material.clone();
        }
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(mat => {
          mat.transparent = true;
          mat.depthWrite = true;
        });
        if (stepIndex === 0) {
          setOpacity(child, 1);
          showMesh(child);
          child.castShadow = true;
        } else {
          setOpacity(child, 0);
          hideMesh(child);
        }
        stepMeshes[stepIndex].push(child);
      }
    });
  });

  /* ── 为浅色网格体添加边缘线 ── */
  model.traverse(child => {
    if (!child.isMesh) return;
    const mat = child.material;
    if (!mat || Array.isArray(mat)) return;
    const col = mat.color;
    if (!col) return;
    const isLightGray = col.r > 0.7 && col.g > 0.7 && col.b > 0.7;
    const isWarmBeige = col.r > 0.7 && (col.r - col.b) > 0.15;
    if (isLightGray || isWarmBeige) {
      const edges = new THREE.EdgesGeometry(child.geometry, 20);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.7 });
      const edgeLines = new THREE.LineSegments(edges, lineMat);
      edgeLines.raycast = () => {};
      child.add(edgeLines);
    }
  });

  /* ── 检测黄色/米色构件（用于飞出动画）──
       策略：优先按材质名称 _Wood_Veneer_02_2 检测，
       然后按名称 M1-M6 查找对应构件组 */
  yellowMeshes = [];
  flyDirections = [];

  // 收集所有使用暖色材质的网格体
  const warmBeigeMeshes = [];
  model.traverse(child => {
    if (!child.isMesh) return;
    const mat = child.material;
    if (!mat) return;
    // 检查材质名称（单个或数组）
    const mats = Array.isArray(mat) ? mat : [mat];
    const isWarmBeige = mats.some(m => m.name && m.name.includes('_Wood_Veneer_02_2'));
    if (isWarmBeige) {
      warmBeigeMeshes.push(child);
    }
  });

  console.log('检测到暖色材质网格体:', warmBeigeMeshes.map(m => m.name));

  // 按名称查找 M1-M6 构件组（节点或网格体）
  const componentNames = ['M1', 'M2', 'M3', 'M4', 'M5', 'M6'];
  const componentGroups = [];

  for (const name of componentNames) {
    // 优先查找同名节点（Group）
    let node = allNodes.find(n => n.name === name && !n.isMesh);
    if (node) {
      componentGroups.push({ name, node, isGroup: true });
      continue;
    }
    // 其次查找包含该名称前缀的节点
    node = allNodes.find(n => n.name && n.name.startsWith(name) && n.children.length > 0 && !n.isMesh);
    if (node) {
      componentGroups.push({ name, node, isGroup: true });
      continue;
    }
    // 最后查找同名网格体
    const mesh = warmBeigeMeshes.find(m => m.name && m.name.startsWith(name));
    if (mesh) {
      componentGroups.push({ name, node: mesh, isGroup: false });
    }
  }

  console.log('找到飞出构件:', componentGroups.map(c => c.name));

  // 构建飞出列表：M1-M4 向前飞出，M5-M6 向上飞出
  // M1-M4 按世界Y坐标从低到高排序（从下往上逐个飞出）
  const forwardComponents = componentGroups.filter(c => c.name <= 'M4');
  const upComponents = componentGroups.filter(c => c.name >= 'M5');

  // 计算世界Y坐标并排序
  forwardComponents.forEach(c => {
    c.worldY = new THREE.Vector3().setFromMatrixPosition(c.node.matrixWorld).y;
  });
  forwardComponents.sort((a, b) => a.worldY - b.worldY);

  // 合并：M1-M4（从下到上）然后 M5-M6
  const orderedComponents = [...forwardComponents, ...upComponents];

  orderedComponents.forEach(comp => {
    yellowMeshes.push({
      object: comp.node,
      origPos: comp.node.position.clone(),
      worldY: comp.worldY || 0
    });
    // M1-M4 向前（+Z），M5-M6 向上（+Y）
    const isUp = comp.name >= 'M5';
    flyDirections.push({ dx: 0, dy: isUp ? 1 : 0, dz: isUp ? 0 : 1 });
  });

  console.log('飞出顺序:', orderedComponents.map(c => c.name));
  console.log('飞出方向:', flyDirections);

  /* ── 场景布局 ── */
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * Math.PI / 180;
  const dist = (maxDim / 2) / Math.tan(fov / 2) * 1.4;

  camera.position.set(center.x + dist * 0.2, center.y + dist * 0.15, center.z + dist);
  camera.lookAt(center);
  camera.near = maxDim * 0.01;
  camera.far = maxDim * 100;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.minDistance = dist * 0.12;
  controls.maxDistance = dist * 6;
  controls.update();

  dirLight.position.set(center.x + size.x * 0.8, center.y + size.y * 1.5, center.z + size.z * 0.6);
  dirLight.target.position.copy(center);
  dirLight.shadow.camera.left = -maxDim;
  dirLight.shadow.camera.right = maxDim;
  dirLight.shadow.camera.top = maxDim;
  dirLight.shadow.camera.bottom = -maxDim;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = maxDim * 5;
  dirLight.shadow.camera.updateProjectionMatrix();

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(maxDim * 10, maxDim * 10),
    new THREE.ShadowMaterial({ opacity: 0.22 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = box.min.y;
  ground.receiveShadow = true;
  scene.add(ground);

  const bottomLight = new THREE.DirectionalLight(0xffffff, 0.35);
  bottomLight.position.set(center.x, box.min.y - size.y * 0.3, center.z);
  bottomLight.target.position.copy(center);
  scene.add(bottomLight);
  scene.add(bottomLight.target);

  loading.classList.add('hide');
  enterMask.style.display = 'flex';
  updateUI();
  animate();
}

/* ── 进入交互 ── */
enterMask.addEventListener('click', () => {
  enterMask.classList.add('hide');
  entered = true;
  bgm.volume = 0.2;
  bgm.play().catch(() => {});
});
init().catch(err => { loadTxt.textContent = '加载失败：' + err.message; });

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

/* ══════════════════════════════════════════
   搭建动画：淡入 + 轻微上滑
   ══════════════════════════════════════════ */
function fadeInStep(step) {
  const meshes = stepMeshes[step];
  meshes.forEach(m => {
    showMesh(m);
    m.userData._fadeStartY = m.position.y;
  });
  const duration = 700;
  const slideDist = maxDim * 0.025;  // 轻微上滑距离
  const startTime = performance.now();

  function tick() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);   // cubic ease-out
    meshes.forEach(m => {
      setOpacity(m, eased);
      // 从下方轻微滑入
      const startY = m.userData._fadeStartY || 0;
      m.position.y = startY - slideDist * (1 - eased);
    });
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      // 确保最终位置精确
      meshes.forEach(m => {
        m.position.y = m.userData._fadeStartY || 0;
        m.castShadow = true;
      });
    }
  }
  tick();
}

/* ── 搭建动画：淡出 ── */
function fadeOutStep(step) {
  const meshes = stepMeshes[step];
  meshes.forEach(m => { m.castShadow = false; });
  const start = performance.now();
  const duration = 350;
  const startOps = meshes.map(m => {
    const mat = Array.isArray(m.material) ? m.material[0] : m.material;
    return mat.opacity;
  });
  function tick() {
    const t = Math.min((performance.now() - start) / duration, 1);
    meshes.forEach((m, i) => setOpacity(m, startOps[i] * (1 - t)));
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      meshes.forEach(m => hideMesh(m));
    }
  }
  tick();
}

/* ══════════════════════════════════════════
   飞出动画：构件沿指定方向飞出
   ══════════════════════════════════════════ */
function flyOutYellow() {
  if (currentYellowIndex >= yellowMeshes.length) return;
  const wasRotating = controls.autoRotate;
  controls.autoRotate = false;
  busy = true;
  yellowPhase = 'flying-out';
  updateUI();

  const ym = yellowMeshes[currentYellowIndex];
  const dir = flyDirections[currentYellowIndex];
  const flyDur = 650;
  const flyDist = maxDim * 0.35;

  const targetPos = ym.origPos.clone();
  targetPos.x += dir.dx * flyDist;
  targetPos.y += dir.dy * flyDist;
  targetPos.z += dir.dz * flyDist;

  const startTime = performance.now();
  function tick() {
    const t = Math.min((performance.now() - startTime) / flyDur, 1);
    // 使用带轻微弹跳的缓动：先快后慢，末端微弹
    const e = easeOutBack(t);
    ym.object.position.lerpVectors(ym.origPos, targetPos, e);
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      ym.object.position.copy(targetPos);
      busy = false;
      yellowPhase = 'out';
      updateUI();
      controls.autoRotate = wasRotating;
    }
  }
  tick();
}

/* ── 收回动画：构件回到原位 ── */
function flyBackYellow() {
  if (currentYellowIndex >= yellowMeshes.length) return;
  const wasRotating = controls.autoRotate;
  controls.autoRotate = false;
  busy = true;
  yellowPhase = 'flying-back';
  updateUI();

  const ym = yellowMeshes[currentYellowIndex];
  const curPos = ym.object.position.clone();
  const flyDur = 500;

  const startTime = performance.now();
  function tick() {
    const t = Math.min((performance.now() - startTime) / flyDur, 1);
    const e = t * t * (3 - 2 * t);  // smoothstep
    ym.object.position.lerpVectors(curPos, ym.origPos, e);
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      ym.object.position.copy(ym.origPos);
      currentYellowIndex++;
      busy = false;
      if (currentYellowIndex >= yellowMeshes.length) {
        yellowPhase = 'done';
      } else {
        yellowPhase = 'none';
      }
      updateUI();
      controls.autoRotate = wasRotating;
    }
  }
  tick();
}

/* ── 缓动函数 ── */
function easeOutBack(t) {
  const c1 = 1.2;   // 较小的过冲量，避免太夸张
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ══════════════════════════════════════════
   步骤导航
   ══════════════════════════════════════════ */
function goTo(next) {
  if (busy) return;
  if (next === index) return;
  if (next > index) {
    busy = true;
    const wasRotating = controls.autoRotate;
    controls.autoRotate = false;
    index = next;
    updateUI();
    fadeInStep(next);
    setTimeout(() => {
      controls.autoRotate = wasRotating;
      busy = false;
    }, 750);
  } else {
    busy = true;
    const wasRotating = controls.autoRotate;
    controls.autoRotate = false;
    const oldIndex = index;
    index = next;
    updateUI();
    for (let i = oldIndex; i > next; i--) {
      fadeOutStep(i);
    }
    setTimeout(() => {
      controls.autoRotate = wasRotating;
      busy = false;
    }, 400);
  }
}

/* ── 重置所有状态 ── */
function resetAll() {
  yellowPhase = 'none';
  currentYellowIndex = 0;
  yellowMeshes.forEach(ym => ym.object.position.copy(ym.origPos));
}

/* ─ UI 更新 ── */
function updateUI() {
  // 飞出阶段显示艺术术语，搭建阶段只显示主标题
  if (yellowPhase !== 'none' && yellowPhase !== 'done' && currentYellowIndex < yellowMeshes.length) {
    const compName = yellowMeshes[currentYellowIndex].object.name || '';
    const artName = componentArtNames[compName] || compName;
    titleMain.textContent = titlePrefix + ' · ' + artName;
  } else {
    titleMain.textContent = titlePrefix;
  }
  titleSub.textContent = '第 ' + (index + 1) + ' / ' + labels.length + ' 步';
  [...progress.children].forEach((d, i) => {
    d.className = 'dot' + (i < index ? ' done' : i === index ? ' active' : '');
  });

  if (yellowPhase === 'flying-out') {
    const compName = yellowMeshes[currentYellowIndex]?.object.name || '';
    const artName = componentArtNames[compName] || compName;
    tip.textContent = `${artName} 飞出中…`;
  } else if (yellowPhase === 'out') {
    const compName = yellowMeshes[currentYellowIndex]?.object.name || '';
    const artName = componentArtNames[compName] || compName;
    tip.textContent = `点击屏幕收回 · ${artName}`;
  } else if (yellowPhase === 'flying-back') {
    const compName = yellowMeshes[currentYellowIndex]?.object.name || '';
    const artName = componentArtNames[compName] || compName;
    tip.textContent = `${artName} 收回中…`;
  } else if (yellowPhase === 'done') {
    tip.textContent = '演示完成！点击屏幕重新开始';
  } else if (yellowPhase === 'none' && index >= labels.length - 1) {
    if (currentYellowIndex < yellowMeshes.length) {
      const remaining = yellowMeshes.length - currentYellowIndex;
      const compName = yellowMeshes[currentYellowIndex]?.object.name || '';
      const artName = componentArtNames[compName] || compName;
      const dirText = flyDirections[currentYellowIndex] && flyDirections[currentYellowIndex].dy > 0
        ? '向上' : '向前';
      tip.textContent = `点击屏幕：${artName} ${dirText}飞出（剩余 ${remaining} 个）`;
    } else {
      tip.textContent = '搭建完成！点击屏幕重新开始';
    }
  } else {
    tip.textContent = '点击屏幕搭建下一步';
  }
}

/* ══════════════════════════════════════════
   交互事件
   ══════════════════════════════════════════ */
let pTime = 0, pMoved = false;
canvas.addEventListener('pointerdown', e => { pTime = Date.now(); pMoved = false; });
canvas.addEventListener('pointermove', () => { pMoved = true; });
canvas.addEventListener('pointerup', e => {
  if (!entered) return;
  if (Date.now() - pTime < 300 && !pMoved) {
    if (yellowPhase === 'none' && index < labels.length - 1) {
      // 搭建阶段：前进一步
      goTo(index + 1);
    } else if (yellowPhase === 'none' && index >= labels.length - 1 && currentYellowIndex < yellowMeshes.length) {
      // 搭建完成：飞出当前构件
      flyOutYellow();
    } else if (yellowPhase === 'out') {
      // 已飞出：收回当前构件
      flyBackYellow();
    } else if (yellowPhase === 'done') {
      // 全部完成：重新开始
      resetAll();
      goTo(0);
    }
  }
});

muteBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (bgm.paused) { bgm.play().catch(() => {}); muteBtn.textContent = '🔊'; }
  else { bgm.pause(); muteBtn.textContent = '🔇'; }
});

restartBtn.addEventListener('click', e => {
  e.stopPropagation();
  resetAll();
  goTo(0);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
