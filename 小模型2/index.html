<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小模型2</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#2a2a2a;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
  #canvas{display:block;width:100%;height:100%;touch-action:none}
  .title-bar{position:absolute;top:0;left:0;right:0;padding:18px 22px 30px;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);color:#fff;pointer-events:none;z-index:5;
    transition:opacity .3s ease}
  .title-bar.hide{opacity:0}
  .title-main{font-size:26px;font-weight:600;letter-spacing:1px}
  .title-sub{font-size:15px;opacity:.75;margin-top:6px;letter-spacing:1px}
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:18px 22px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;z-index:5;text-align:center}
  .tip{font-size:14px;opacity:.95}
  .controls{position:absolute;top:16px;right:14px;z-index:6;display:flex;gap:10px}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.18);
    color:#fff;backdrop-filter:blur(6px);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .btn:active{background:rgba(255,255,255,.32)}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#fff;z-index:10;text-align:center;transition:opacity .4s}
  .loading.hide{opacity:0;pointer-events:none}
  .loading .bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:12px;overflow:hidden}
  .loading .bar-fill{height:100%;width:0%;background:#ffd24a;border-radius:2px;transition:width .3s}
  .loading .txt{font-size:14px;opacity:.85}
  .enter-mask{position:absolute;inset:0;z-index:20;background:#2a2a2a;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;
    transition:opacity .6s}
  .enter-mask.hide{opacity:0;pointer-events:none}
  .enter-mask .play{width:80px;height:80px;border-radius:50%;
    border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;
    justify-content:center;font-size:30px;padding-left:6px;margin:0 auto}
  .enter-mask .label{margin-top:18px;font-size:15px;opacity:.8;text-align:center}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="title-bar" id="titleBar">
  <div class="title-main">小模型2</div>
  <div class="title-sub" id="titleSub">点击屏幕展开模型</div>
  <div class="title-sub" style="opacity:.5;font-size:13px;margin-top:2px">空间搭建交互动画演示</div>
</div>
<div class="controls">
  <button class="btn" id="muteBtn" title="音乐开关">&#128266;</button>
</div>
<div class="bottom-bar">
  <div class="tip" id="tip">点击屏幕：展开 / 收回</div>
</div>

<div class="loading" id="loading">
  <div class="txt" id="loadTxt">加载中...</div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>

<div class="enter-mask" id="enterMask" style="display:none">
  <div>
    <div class="play">&#9654;</div>
    <div class="label">点击进入</div>
  </div>
</div>

<audio id="bgm" loop preload="auto" src="桃花源2-小模型2.mp3"></audio>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const titleBar=document.getElementById('titleBar'),
      titleSub=document.getElementById('titleSub'),
      tip=document.getElementById('tip'),
      loading=document.getElementById('loading'),
      loadTxt=document.getElementById('loadTxt'),
      barFill=document.getElementById('barFill'),
      enterMask=document.getElementById('enterMask'),
      bgm=document.getElementById('bgm'),
      muteBtn=document.getElementById('muteBtn');

const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x2a2a2a);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.shadowMap.radius=8;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100000);

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const dirLight=new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.bias=-0.0005;
dirLight.shadow.radius=12;
dirLight.shadow.blurSamples=25;
scene.add(dirLight);
scene.add(dirLight.target);

const ambLight=new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambLight);

// ── 控制器（优化平移 + 缩放体验）──
const controls=new OrbitControls(camera, canvas);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.autoRotate=true;
controls.autoRotateSpeed=0.5;
controls.enablePan=true;
controls.screenSpacePanning=true;   // 屏幕空间平移，放大后拖动更直观
controls.panSpeed=1.2;              // 提高平移速度
controls.minDistance=0.5;           // 允许更近距离放大
controls.maxDistance=5000;          // 允许更远距离缩小

// ── 加载管理器 ──
const loadingManager=new THREE.LoadingManager();
loadingManager.onProgress=(url, loaded, total)=>{
  const pct=Math.round(loaded/total*100);
  barFill.style.width=pct+'%';
  loadTxt.textContent='加载中 '+pct+'%';
};

// ── 加载模型 ──
const loader=new GLTFLoader(loadingManager);
let model=null;
let state='closed';
let wasRotating=false;

// ── 自定义缓动动画（替代损坏的 glTF 动画）──
const animParts = [];  // {mesh, homePos, explodePos}
let tweenProgress = 0;   // 0=合拢(home) / 1=散开(explode)
let tweenTarget = 0;     // 目标进度
let tweening = false;    // 是否正在播放
const TWEEN_DURATION = 1.8;  // 秒

function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

async function init(){
  const gltf=await loader.loadAsync('models/Model.gltf');
  model=gltf.scene;

  // --- 修复玻璃/透明材质 ---
  let glassCount=0;
  model.traverse(child=>{
    if(!child.isMesh) return;
    child.castShadow=true;
    child.receiveShadow=true;
    const mat=child.material;
    if(!mat) return;
    const mats=Array.isArray(mat)?mat:[mat];
    mats.forEach(m=>{
      const name=(m.name||'').toLowerCase();
      const isGlass=name.includes('glass')||name.includes('透明')||
                     name.includes('玻璃')||name.includes('window')||
                     name.includes('win_')||name.includes('transp');
      if(m.isMeshPhysicalMaterial&&m.transmission>0){
        m.transparent=true;
        m.opacity=Math.min(m.opacity||1, 0.35);
        m.depthWrite=false;
        m.needsUpdate=true;
        glassCount++;
      }else if(isGlass||(m.opacity<1&&m.opacity>0)){
        if(!isGlass&&m.opacity>=0.95) return;
        m.transparent=true;
        if(m.opacity>=0.9) m.opacity=0.3;
        m.depthWrite=false;
        m.needsUpdate=true;
        glassCount++;
      }
    });
  });
  if(glassCount>0) console.log('✅ 共处理',glassCount,'个玻璃材质');

  // --- 为白色模型生成边缘线（增强边界可见性）---
  model.traverse(child=>{
    if(!child.isMesh) return;
    const mat=child.material;
    if(!mat || Array.isArray(mat)) return;
    const col=mat.color;
    if(col && col.getHex()===0xffffff){
      const edges=new THREE.EdgesGeometry(child.geometry, 20);
      const lineMat=new THREE.LineBasicMaterial({color:0x666666, transparent:true, opacity:0.6});
      const edgeLines=new THREE.LineSegments(edges, lineMat);
      edgeLines.raycast=()=>{};
      child.add(edgeLines);
    }
  });

  // --- 修复散开的模型部件 + 准备自定义动画数据 ---
  const mesh1Node = model.children.find(c => c.name === 'Mesh1');
  if (mesh1Node) {
    const parts = [];
    mesh1Node.traverse(child => {
      if (child.isMesh) parts.push(child);
    });
    if (parts.length > 1) {
      // 计算所有部件的世界坐标中心（合拢位置）
      const groupCenter = new THREE.Vector3();
      parts.forEach(p => {
        const wp = new THREE.Vector3();
        p.getWorldPosition(wp);
        groupCenter.add(wp);
      });
      groupCenter.divideScalar(parts.length);

      // 为每个部件设定：合拢位置(home) + 散开位置(explode)
      parts.forEach((p, i) => {
        const homePos = new THREE.Vector3(
          groupCenter.x,
          groupCenter.y,
          groupCenter.z + i * 0.05
        );
        // 散开位置：从中心向外辐射，不同方向+距离
        const angle = (i / parts.length) * Math.PI * 2;
        const dist = 8 + i * 3;  // 越远的部件飞得越远
        const explodePos = new THREE.Vector3(
          groupCenter.x + Math.cos(angle) * dist,
          groupCenter.y + 2 + i * 1.5,  // 向上散开
          groupCenter.z + Math.sin(angle) * dist * 0.6
        );

        mesh1Node.remove(p);
        model.add(p);
        p.position.copy(homePos);
        p.rotation.set(0, 0, 0);
        p.scale.set(1, 1, 1);

        animParts.push({ mesh: p, homePos, explodePos });
      });
      console.log('✅ 已拼合', parts.length, '个部件，准备自定义展开动画');
    }
  }

  scene.add(model);
  setupCamera(model);

  loading.classList.add('hide');
  enterMask.style.display='flex';
  animate();
}
init().catch(err=>{ loadTxt.textContent='加载失败：'+err.message; console.error(err); });

function setupCamera(model){
  const box=new THREE.Box3().setFromObject(model);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const maxDim=Math.max(size.x, size.y, size.z);
  const fov=camera.fov*Math.PI/180;
  const dist=(maxDim/2)/Math.tan(fov/2)*1.4;
  camera.position.set(center.x+dist*0.2, center.y+dist*0.15, center.z+dist);
  camera.lookAt(center);
  camera.near=maxDim*0.001; camera.far=maxDim*1000;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.minDistance=maxDim*0.05;   // 允许放很大
  controls.maxDistance=dist*8;        // 允许缩很远
  controls.update();

  dirLight.position.set(center.x+size.x*0.8, center.y+size.y*1.5, center.z+size.z*0.6);
  dirLight.target.position.copy(center);
  dirLight.shadow.camera.left=-maxDim; dirLight.shadow.camera.right=maxDim;
  dirLight.shadow.camera.top=maxDim; dirLight.shadow.camera.bottom=-maxDim;
  dirLight.shadow.camera.near=0.1; dirLight.shadow.camera.far=maxDim*5;
  dirLight.shadow.camera.updateProjectionMatrix();

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(maxDim*10, maxDim*10),
    new THREE.ShadowMaterial({ opacity:0.22 })
  );
  ground.rotation.x=-Math.PI/2;
  ground.position.y=box.min.y;
  ground.receiveShadow=true;
  scene.add(ground);

  // 底部补光
  const bottomLight=new THREE.DirectionalLight(0xffffff, 0.35);
  bottomLight.position.set(center.x, center.y-size.y*0.5, center.z);
  bottomLight.target.position.copy(center);
  scene.add(bottomLight);
  scene.add(bottomLight.target);
}

// ── 动画循环 ──
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const delta=clock.getDelta();

  // ── 自定义缓动更新 ──
  if (tweening) {
    const speed = 1 / TWEEN_DURATION;
    if (tweenTarget > tweenProgress) {
      tweenProgress = Math.min(tweenProgress + delta * speed, tweenTarget);
    } else if (tweenTarget < tweenProgress) {
      tweenProgress = Math.max(tweenProgress - delta * speed, tweenTarget);
    }
    const t = easeInOutCubic(tweenProgress);
    animParts.forEach(p => {
      p.mesh.position.lerpVectors(p.homePos, p.explodePos, t);
    });
    // 检测是否到达目标
    if (Math.abs(tweenProgress - tweenTarget) < 0.001) {
      tweenProgress = tweenTarget;
      tweening = false;
      if (state === 'opening') {
        state = 'open';
        controls.autoRotate = wasRotating;
        titleSub.textContent = '模型已展开';
        tip.textContent = '点击屏幕：收回模型';
        titleBar.classList.remove('hide');
      } else if (state === 'closing') {
        state = 'closed';
        controls.autoRotate = wasRotating;
        titleSub.textContent = '点击屏幕展开模型';
        tip.textContent = '点击屏幕：展开 / 收回';
        titleBar.classList.remove('hide');
      }
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ── 点击进入：播放音乐 ──
let entered=false;
enterMask.addEventListener('click',()=>{
  enterMask.classList.add('hide');
  entered=true;
  bgm.volume=0.4;
  bgm.play().catch(()=>{});
});

// ── 展开 / 收回（自定义缓动）──
function toggleModel(){
  if(!entered || animParts.length === 0) return;

  if(state==='closed'){
    // 展开：从合拢位置飞散开
    state='opening';
    titleBar.classList.add('hide');
    wasRotating=controls.autoRotate;
    controls.autoRotate=false;
    tweenTarget = 1;
    tweening = true;
    titleSub.textContent='模型展开中…';
    tip.textContent='展开中…';
  }
  else if(state==='open'||state==='opening'){
    // 收回：飞回合拢位置
    state='closing';
    titleBar.classList.add('hide');
    wasRotating=controls.autoRotate;
    controls.autoRotate=false;
    tweenTarget = 0;
    tweening = true;
    titleSub.textContent='模型收回中…';
    tip.textContent='收回中…';
  }
}

// ── 点击检测（用像素阈值替代布尔标志，避免误判拖动）──
let downX=0, downY=0, downT=0;
canvas.addEventListener('pointerdown', e=>{
  downX=e.clientX; downY=e.clientY; downT=Date.now();
});
canvas.addEventListener('pointerup', e=>{
  const dx=Math.abs(e.clientX-downX);
  const dy=Math.abs(e.clientY-downY);
  const dt=Date.now()-downT;
  // 移动 <12px 且时间 <800ms 才算点击（允许触屏轻微抖动）
  if(dx<12 && dy<12 && dt<800){
    toggleModel();
  }
});

muteBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(bgm.paused){ bgm.play().catch(()=>{}); muteBtn.textContent='\u{1F50A}'; }
  else{ bgm.pause(); muteBtn.textContent='\u{1F507}'; }
});

window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
