<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《设计专题（1）概念与空间》空间模型交互展示合集</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#1a1a2e;color:#fff;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  h1{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:2px;text-align:center;line-height:1.5}
  h1 .sub-title{font-size:18px;display:block;margin-top:4px}
  .sub{font-size:14px;opacity:.6;margin-bottom:8px}
  .scan-tip{font-size:13px;opacity:.5;margin-bottom:40px;text-align:center;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:1000px;width:100%}
  .card{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px 22px 24px;transition:all .3s ease;backdrop-filter:blur(6px);cursor:pointer}
  .card:hover{background:rgba(255,255,255,.12);border-color:rgba(255,210,74,.4);transform:translateY(-4px)}
  .card .icon{font-size:40px;margin-bottom:14px}
  .card .icon img{width:52px;height:52px;object-fit:contain;border-radius:8px}
  .card .name{font-size:20px;font-weight:600;margin-bottom:6px;letter-spacing:1px}
  .card .desc{font-size:13px;opacity:.6;text-align:center;line-height:1.5;margin-bottom:16px}
  .card .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
  .card .qr-box{width:132px;height:132px;border-radius:10px;background:#fff;padding:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .card .qr-box img,.card .qr-box canvas{width:120px;height:120px;display:block}
  .card .qr-label{font-size:12px;opacity:.5;letter-spacing:1px}
  .card .arrow{margin-top:14px;font-size:13px;color:#ffd24a;opacity:.6;transition:opacity .3s}
  .card:hover .arrow{opacity:1}
  .footer{margin-top:40px;font-size:13px;opacity:.35}
</style>
</head>
<body>
  <h1>《设计专题（1）概念与空间》<span class="sub-title">空间模型交互展示合集</span></h1>
  <p class="sub">点击卡片进入对应模型演示</p>
  <p class="scan-tip"> 手机扫码即可观看，无需连接同一 WiFi</p>
  <div class="grid" id="grid">
    <!-- JS 动态生成 -->
  </div>
  <div class="footer">© 2026 · 空间模型交互展示合集</div>

<script>
const BASE_URL = 'https://harrustashicka-oss.github.io/my-3d';
const models = [
  { name: '空间转译·屏障世界', path: '屏障世界', icon: '🏯', iconImg: 'icons/pingzhang.jpg', desc: '12 步空间搭建<br>接 → 钉 → 转 → 安 → ... → 榫' },
  { name: '空间转译·卧林藏空', path: '卧林藏空', icon: '🏚️', iconImg: 'icons/wulin.jpg', desc: '空间搭建交互动画演示' },
  { name: '空间转译·墨香斗影', path: '斗拱',     icon: '🏛️', iconImg: 'icons/moxiang.jpg', desc: '8 步搭建动画' },
  { name: '空间转译·洞石鹤庭',  path: '洞石鹤庭', icon: '🏺', iconImg: 'icons/dongshi.jpg', desc: '瘦、皱、透、漏<br>空间搭建交互动画演示' },
  { name: '空间转译·掇山如画',  path: '掇山如画', icon: '🏔️', iconImg: 'icons/dushan.jpg', desc: '3 组建升交互演示' },
  { name: '空间转译·解字游园',  path: '解字游园', icon: '🎋', iconImg: 'icons/jiezi.jpg', desc: '8 步交互动画<br>定 → 破 → 磨 → 风' },
  { name: '空间转译·寻她',    path: '寻她',   icon: '🏛️', iconImg: 'icons/xunta.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间转译·隐叹红楼', path: '隐叹红楼', icon: '🏛️', iconImg: 'icons/yintan.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 壹',  path: '小模型1', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 贰',  path: '小模型2', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 叁',  path: '小模型3', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 肆',  path: '小模型4', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 伍',  path: '小模型5', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 陆',  path: '小模型6', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 柒',  path: '小模型7', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 捌',  path: '小模型8', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },
  { name: '空间操作·模型 玖', path: '小模型9', icon: '🪨', iconImg: 'icons/xiaomo.jpg', desc: '空间搭建交互动画演示<br>点击展开 / 收回' },

];

const grid = document.getElementById('grid');

function createCard(m) {
  // 对中文路径做 URL 编码，避免二维码扫码出现乱码
  const encodedPath = encodeURIComponent(m.path);
  const url = BASE_URL + '/' + encodedPath + '/';
  
  // 创建卡片
  const card = document.createElement('a');
  card.className = 'card';
  card.href = m.path + '/index.html';
  
  const icon = document.createElement('div');
  icon.className = 'icon';
  if (m.iconImg) {
    const img = document.createElement('img');
    img.src = m.iconImg;
    img.alt = m.name;
    icon.appendChild(img);
  } else {
    icon.textContent = m.icon;
  }
  card.appendChild(icon);
  
  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = m.name;
  card.appendChild(name);
  
  const desc = document.createElement('div');
  desc.className = 'desc';
  desc.innerHTML = m.desc;
  card.appendChild(desc);
  
  // 二维码区域
  const qrWrap = document.createElement('div');
  qrWrap.className = 'qr-wrap';
  
  const qrBox = document.createElement('div');
  qrBox.className = 'qr-box';
  qrBox.id = 'qr-' + m.path;
  qrWrap.appendChild(qrBox);
  
  // 用 QRCode 生成二维码（qrcodejs2 库需要一个 div 容器）
  try {
    if (typeof QRCode === 'function') {
      new QRCode(qrBox, {
        text: url,
        width: 120,
        height: 120,
        colorDark: '#1a1a2e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } else {
      throw new Error('QRCode 库未加载');
    }
  } catch(err) {
    console.error('二维码生成失败:', err);
    qrBox.textContent = '二维码加载失败';
    qrBox.style.fontSize = '12px';
    qrBox.style.color = '#333';
  }
  
  const qrLabel = document.createElement('div');
  qrLabel.className = 'qr-label';
  qrLabel.textContent = '手机扫码观看';
  qrWrap.appendChild(qrLabel);
  
  card.appendChild(qrWrap);
  
  const arrow = document.createElement('div');
  arrow.className = 'arrow';
  arrow.textContent = '进入观看 →';
  card.appendChild(arrow);
  
  grid.appendChild(card);
}

// 确保二维码库加载完成后再生成
if (typeof QRCode === 'function') {
  models.forEach(createCard);
} else {
  // 库还没加载完，等 DOM 和脚本加载
  window.addEventListener('load', () => {
    models.forEach(createCard);
  });
}
</script>
</body>
</html>
