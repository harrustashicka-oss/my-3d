<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#1a1a2e;color:#fff;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}

  .card{display:block;text-decoration:none;color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px 28px;transition:all .3s ease;backdrop-filter:blur(6px)}

  .card .icon{font-size:40px;margin-bottom:18px}

  .card .desc{font-size:14px;opacity:.65;line-height:1.6}
  .card .arrow{margin-top:18px;font-size:13px;color:#ffd24a;opacity:0;transition:opacity .3s}
  .card:hover .arrow{opacity:1}
  .footer{margin-top:50px;font-size:13px;opacity:.4}

</head>
