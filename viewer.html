<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 模型查看</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
  <style>
    html, body { margin: 0; height: 100%; }
    model-viewer { width: 100%; height: 100%; background: #f0f0f0; }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    shadow-intensity="1"
    touch-action="pan-y"
    camera-orbit="0deg 75deg 200%">
  </model-viewer>
  <script>
    const viewer = document.getElementById('viewer');
    const params = new URLSearchParams(location.search);
    viewer.src =(params.get('model') || 'model1.glb');
 <script>
  const mv = document.querySelector('model-viewer');
  let expanded = false;
  let downX, downY, moved;
  mv.addEventListener('pointerdown', e => {
    downX = e.clientX; downY = e.clientY; moved = false;
  });
  mv.addEventListener('pointermove', e => {
    if (Math.abs(e.clientX - downX) > 5 || Math.abs(e.clientY - downY) > 5) moved = true;
  });
  mv.addEventListener('pointerup', () => {
    if (moved) return;        // 拖动了，不触发
    mv.timeScale = expanded ? -1 : 1;
    mv.play({repetitions: 1});
    expanded = !expanded;
  });
</script>

  mv.addEventListener('pointermove', (e) => {
    if (Math.abs(e.clientX - downX) > 5 || Math.abs(e.clientY - downY) > 5) {
      moved = true;   // 移动超过5像素，算拖动
    }
  });

  mv.addEventListener('pointerup', () => {
    if (moved) return;        // 是拖动，不触发动画
    mv.currentTime = 0;       // 从头开始
    mv.play({ repetitions: 1 }); // 只播放一遍
  });
</script>
</body>
</html>
