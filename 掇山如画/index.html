<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>掇山如画</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#2a2a2a;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
  #canvas{display:block;width:100%;height:100%;touch-action:none}
  .title-bar{position:absolute;top:0;left:0;right:0;padding:18px 22px 30px;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);color:#fff;pointer-events:none;z-index:5;
    transition:opacity .3s ease}
  .title-bar.hide{opacity:0}
  .title-main{font-size:26px;font-weight:600;letter-spacing:1px}
  .title-sub{font-size:15px;opacity:.75;margin-top:6px;letter-spacing:1px}
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:18px 22px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;z-index:5;pointer-events:none}
  .tip{font-size:14px;margin-bottom:12px;opacity:.95}
  .progress{display:flex;gap:6px}
  .dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.25);transition:background .4s}
  .dot.active{background:#ffd24a}
  .dot.done{background:rgba(255,210,74,.55)}
  .controls{position:absolute;top:16px;right:14px;z-index:6;display:flex;gap:10px}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.18);
    color:#fff;backdrop-filter:blur(6px);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .btn:active{background:rgba(255,255,255,.32)}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#fff;z-index:10;text-align:center;transition:opacity .4s}
  .loading.hide{opacity:0;pointer-events:none}
  .loading .bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:12px;overflow:hidden}
  .loading .bar-fill{height:100%;width:0%;background:#ffd24a;border-radius:2px;transition:width .3s}
  .loading .txt{font-size:14px;opacity:.85}
  .enter-mask{position:absolute;inset:0;z-index:20;background:#2a2a2a;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;
    transition:opacity .6s}
  .enter-mask.hide{opacity:0;pointer-events:none}
  .enter-mask .play{width:80px;height:80px;border-radius:50%;
    border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;
    justify-content:center;font-size:30px;padding-left:6px;margin:0 auto}
  .enter-mask .label{margin-top:18px;font-size:15px;opacity:.8;text-align:center}
  /* 调试面板 */
  .debug-panel{position:absolute;top:10px;right:60px;z-index:30;
    background:rgba(0,0,0,.75);color:#0f0;font-size:11px;font-family:monospace;
    padding:8px 12px;border-radius:4px;pointer-events:none;line-height:1.5}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="title-bar" id="titleBar">
  <div class="title-main" id="titleMain">掇山如画</div>
  <div class="title-sub" id="titleSub">第 1 / 3 步</div>
</div>
<div class="controls">
  <button class="btn" id="muteBtn" title="音乐开关">&#128266;</button>
</div>
<div class="bottom-bar">
  <div class="tip" id="tip">点击屏幕：升起第1组</div>
  <div class="progress" id="progress"></div>
</div>

<div class="loading" id="loading">
  <div class="txt" id="loadTxt">加载中...</div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>

<div class="enter-mask" id="enterMask" style="display:none">
  <div>
    <div class="play">&#9654;</div>
    <div class="label">点击进入</div>
  </div>
</div>

<div class="debug-panel" id="debug"></div>

<audio id="bgm" loop preload="auto" src="bgm.mp3"></audio>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

function dbg(msg){ console.log('[掇山]',msg); }

const titleBar=document.getElementById('titleBar');
const titleMain=document.getElementById('titleMain');
const titleSub=document.getElementById('titleSub');
const tip=document.getElementById('tip');
const progress=document.getElementById('progress');
const loading=document.getElementById('loading');
const loadTxt=document.getElementById('loadTxt');
const barFill=document.getElementById('barFill');
const enterMask=document.getElementById('enterMask');
const bgm=document.getElementById('bgm');
const muteBtn=document.getElementById('muteBtn');
const debugEl=document.getElementById('debug');

let groups=[];
let groupData=[];
let nextRiseIndex=0;
let risenIndex=-1;
let isAnimating=false;
let isAllDone=false;
let modelCenter=new THREE.Vector3();
let maxDim=0;
let entered=false;

const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x2a2a2a);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.shadowMap.radius=55;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.88;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100000);

const pmrem=new THREE.PMREMGenerator(renderer);
try{ scene.environment=pmrem.fromScene(new RoomEnvironment(renderer),0.04).texture; }
catch(e){ console.warn('RoomEnvironment失败，跳过:', e.message); }

const dirLight=new THREE.DirectionalLight(0xffffff,1.5);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.bias=-0.0005;
dirLight.shadow.radius=55;
dirLight.shadow.blurSamples=80;
scene.add(dirLight);
scene.add(dirLight.target);

const ambLight=new THREE.AmbientLight(0xffffff,0.35);
scene.add(ambLight);

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.autoRotate=true;
controls.autoRotateSpeed=0.5;
controls.enablePan=true;
controls.panSpeed=0.8;

const loadingManager=new THREE.LoadingManager();
loadingManager.onProgress=(url,loaded,total)=>{
  const pct=Math.round(loaded/total*100);
  barFill.style.width=pct+'%';
  loadTxt.textContent='加载中 '+pct+'%';
};

const loader=new GLTFLoader(loadingManager);

function updateDebug(){
  debugEl.innerHTML=[
    'groups: '+groups.length,
    'nextRise: '+nextRiseIndex,
    'risenIdx: '+risenIndex,
    'animating: '+isAnimating,
    'allDone: '+isAllDone,
    'entered: '+entered,
  ].join('<br>');
}

async function init(){
  dbg('开始加载模型');
  const gltf=await loader.loadAsync('models/Model.glb');
  const model=gltf.scene;
  dbg('模型加载完成，name='+model.name);

  // 打印模型树结构
  dbg('模型直接子节点('+model.children.length+'个):');
  model.children.forEach((child,i)=>{
    dbg('  ['+i+'] type='+child.type+' name='+(child.name||'(无)')+' children='+child.children.length);
  });

  // 查找顶层Group
  groups=[];
  let rootToUse=model;
  
  // 先收集模型直接子节点中可作为Group的候选
  let candidates=model.children.filter(child=>child.isObject3D && child.children && child.children.length>0);
  dbg('直接子节点候选数: '+candidates.length+' 个');
  candidates.forEach((c,i)=>dbg('  ['+i+'] name='+c.name+' type='+c.type+' kids='+c.children.length));
  
  // 如果只有一个候选且内部还有子节点，说明它是包装根节点（如GLTF根节点Model），需要展开
  if(candidates.length===1 && candidates[0].children.length>0){
    const inner=candidates[0].children.filter(c=>c.isObject3D && c.children && c.children.length>0);
    if(inner.length>=2){
      dbg('检测到包装根节点: '+candidates[0].name+'，展开子级');
      rootToUse=candidates[0];
      candidates=inner;
    }
  }
  
  groups=candidates;
  dbg('最终识别到 '+groups.length+' 个Group');
  
  // 如果还不够3个，在更深层遍历（最后兜底）
  if(groups.length<3){
    dbg('警告: Group少于3个，深层遍历...');
    groups=[];
    model.traverse(child=>{
      if(child !== model && child.isObject3D && child.children && child.children.length>0 && child.parent === rootToUse){
        groups.push(child);
      }
    });
    dbg('深层遍历结果: '+groups.length+' 个Group');
  }

  // 打印groups详情
  groups.forEach((g,i)=>{
    const b=new THREE.Box3().setFromObject(g);
    const c=b.getCenter(new THREE.Vector3());
    dbg('Group['+i+']: name='+(g.name||'?')+' pos='+g.position.toArray().map(v=>v.toFixed(1)).join(',')+' center='+c.toArray().map(v=>v.toFixed(1)).join(','));
  });

  model.traverse(child=>{
    if(child.isMesh){ child.castShadow=true; child.receiveShadow=true; }
  });

  scene.add(model);

  const box=new THREE.Box3().setFromObject(model);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  maxDim=Math.max(size.x,size.y,size.z);
  const fov=camera.fov*Math.PI/180;
  const dist=(maxDim/2)/Math.tan(fov/2)*1.4;

  dbg('模型尺寸: '+size.toArray().map(v=>v.toFixed(1)).join(',')+' maxDim='+maxDim.toFixed(1));

  camera.position.set(center.x+dist*0.2,center.y+dist*0.15,center.z+dist);
  camera.lookAt(center);
  camera.near=maxDim*0.01; camera.far=maxDim*100;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.minDistance=dist*0.12; controls.maxDistance=dist*6;
  controls.update();

  dirLight.position.set(center.x+size.x*0.8,center.y+size.y*1.5,center.z+size.z*0.6);
  dirLight.target.position.copy(center);
  dirLight.shadow.camera.left=-maxDim; dirLight.shadow.camera.right=maxDim;
  dirLight.shadow.camera.top=maxDim; dirLight.shadow.camera.bottom=-maxDim;
  dirLight.shadow.camera.near=0.1; dirLight.shadow.camera.far=maxDim*5;
  dirLight.shadow.camera.updateProjectionMatrix();

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(maxDim*10,maxDim*10),
    new THREE.ShadowMaterial({opacity:0.22})
  );
  ground.rotation.x=-Math.PI/2;
  ground.position.y=box.min.y;
  ground.receiveShadow=true;
  scene.add(ground);

  const bottomLight=new THREE.DirectionalLight(0xffffff,0.35);
  bottomLight.position.set(center.x, center.y-size.y*0.5, center.z);
  bottomLight.target.position.copy(center);
  scene.add(bottomLight);
  scene.add(bottomLight.target);

  modelCenter.copy(center);

  // 按Y坐标排序（从低到高）
  const sorted=groups.map((g,i)=>({group:g, idx:i})).sort((a,b)=>{
    const ca=new THREE.Box3().setFromObject(a.group).getCenter(new THREE.Vector3());
    const cb=new THREE.Box3().setFromObject(b.group).getCenter(new THREE.Vector3());
    return ca.y - cb.y;
  });
  groups=sorted.map(s=>s.group);
  dbg('排序后的Group顺序: '+groups.map(g=>g.name).join(', '));

  // 为每个Group构建动画数据
  groupData=[];
  groups.forEach((group,idx)=>{
    const gBox=new THREE.Box3().setFromObject(group);
    const gWorldCenter=gBox.getCenter(new THREE.Vector3());

    // Group上升方向
    const dir=gWorldCenter.clone().sub(modelCenter).normalize();
    if(dir.length()<0.001) dir.set(0,1,0);
    dir.y += 0.3;
    dir.normalize();

    // 收集Group下每个直接子节点的爆炸数据
    const meshChildren=[];
    group.children.forEach((child,j)=>{
      const cBox=new THREE.Box3().setFromObject(child);
      const cCenter=cBox.getCenter(new THREE.Vector3());
      let cDir=cCenter.clone().sub(gWorldCenter).normalize();
      if(cDir.length()<0.001) cDir.set(j===0?0.7:-0.7, 0.5, 0.3).normalize();
      cDir.y += 0.2; cDir.normalize();
      meshChildren.push({
        object:child,
        origPos:child.position.clone(),
        explodeDir:cDir,
        explodeDist:maxDim*0.15
      });
      dbg('  Group'+idx+' MeshChild['+j+']: '+child.name+' orig='+child.position.toArray().map(v=>v.toFixed(1)).join(',')+' dir='+cDir.toArray().map(v=>v.toFixed(2)));

      // 递归：如果child下面还有子Mesh，也收集
      child.traverse(grand=>{
        if(grand.isMesh){
          const gb=new THREE.Box3().setFromObject(grand);
          const gc=gb.getCenter(new THREE.Vector3());
          let gd=gc.clone().sub(gWorldCenter).normalize();
          if(gd.length()<0.001) gd.set((j*2+1)*0.5-0.5, 0.6, 0).normalize();
          meshChildren.push({
            object:grand,
            origPos:grand.position.clone(),
            explodeDir:gd,
            explodeDist:maxDim*0.2
          });
        }
      });
    });

    groupData.push({
      origPos:group.position.clone(),
      origScale:group.scale.clone(),
      origRot:new THREE.Euler(group.rotation.x,group.rotation.y,group.rotation.z),
      explodeDir:dir.clone(),
      explodeDist:maxDim*(0.45 + idx*0.15),
      meshChildren:meshChildren
    });

    dbg('GroupData['+idx+']: name='+group.name+' meshes='+meshChildren.length+' dir='+dir.toArray().map(v=>v.toFixed(2)));
  });

  // 进度点
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='dot';
    progress.appendChild(d);
  }

  updateUI();
  updateDebug();
  dbg('初始化完成, ready');

  loading.classList.add('hide');
  enterMask.style.display='flex';
  animate();
}
init().catch(err=>{
  dbg('初始化失败: '+err.message);
  loadTxt.textContent='加载失败：'+(err.message||String(err));
  loadTxt.style.cssText='font-size:12px; white-space:pre-wrap; max-width:90vw; word-break:break-all';
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}

// 点击进入遮罩
enterMask.addEventListener('click',e=>{
  dbg('进入遮罩点击');
  e.stopPropagation();
  enterMask.classList.add('hide');
  entered=true;
  bgm.volume=0.2;
  bgm.play().catch(()=>{});
  updateDebug();
});

muteBtn.addEventListener('click',e=>{
  e.stopPropagation();
  if(bgm.paused){ bgm.play().catch(()=>{}); muteBtn.innerHTML='&#128266;'; }
  else{ bgm.pause(); muteBtn.innerHTML='&#128263;'; }
});

// 简化点击处理：直接监听canvas的click
canvas.addEventListener('click',e=>{
  dbg('canvas click: entered='+entered+' animating='+isAnimating+' allDone='+isAllDone);
  updateDebug();

  if(!entered){
    dbg('  → 跳过: 未进入');
    return;
  }
  if(isAnimating){
    dbg('  → 跳过: 动画中');
    return;
  }
  if(isAllDone){
    dbg('  → 全部完成，重置重来');
    resetAll();
    return;
  }

  handleClick();
});

function handleClick(){
  dbg('handleClick: risenIndex='+risenIndex+' nextRiseIndex='+nextRiseIndex);

  if(risenIndex === -1){
    // 当前没有升起的组 → 升起下一组
    if(nextRiseIndex >= groups.length){
      dbg('  → 无更多组');
      return;
    }
    dbg('  → 升起 Group['+nextRiseIndex+']: '+groups[nextRiseIndex].name);
    riseGroup(nextRiseIndex);
  } else {
    // 当前有升起的组 → 收回
    dbg('  → 收回 Group['+risenIndex+']: '+groups[risenIndex].name);
    fallGroup(risenIndex);
  }
}

function riseGroup(groupIndex){
  if(groupIndex >= groups.length){
    dbg('ERROR: riseGroup索引越界 '+groupIndex+'/'+groups.length);
    return;
  }
  dbg('riseGroup('+groupIndex+') 开始 → 二阶段: 上升 → 炸开');
  isAnimating=true;
  risenIndex=groupIndex;
  updateDebug();

  const wasRotating=controls.autoRotate;
  controls.autoRotate=false;

  titleBar.classList.add('hide');

  const group=groups[groupIndex];
  const data=groupData[groupIndex];

  const phase1Duration=600;  // Group上升
  const phase2Duration=500;  // Mesh炸开
  const totalDuration=phase1Duration+phase2Duration;
  const startTime=performance.now();

  function tick(){
    const elapsed=performance.now()-startTime;
    const t=Math.min(elapsed/totalDuration,1);

    if(elapsed <= phase1Duration){
      // 阶段1：Group上升
      const p1=elapsed/phase1Duration;
      const eased=1-Math.pow(1-p1,3);
      const offset=data.explodeDir.clone().multiplyScalar(data.explodeDist*eased);
      group.position.copy(data.origPos).add(offset);
      group.scale.setScalar(1+0.05*eased);
      tip.textContent='第'+(groupIndex+1)+'组升起中...';
    } else {
      // 阶段2：子Mesh炸开
      const p2=(elapsed-phase1Duration)/phase2Duration;
      const eased=1-Math.pow(1-p2,3);
      data.meshChildren.forEach(mc=>{
        const off=mc.explodeDir.clone().multiplyScalar(mc.explodeDist*eased);
        mc.object.position.copy(mc.origPos).add(off);
      });
      tip.textContent='第'+(groupIndex+1)+'组炸开中...';
    }

    if(t<1){
      requestAnimationFrame(tick);
    }else{
      dbg('riseGroup('+groupIndex+') 完成');
      isAnimating=false;
      updateUI();
      updateDebug();
      controls.autoRotate=wasRotating;
      titleBar.classList.remove('hide');
      tip.textContent='点击屏幕：收回第'+(groupIndex+1)+'组';
    }
  }
  tick();
}

function fallGroup(groupIndex){
  if(groupIndex >= groups.length){
    dbg('ERROR: fallGroup索引越界 '+groupIndex+'/'+groups.length);
    return;
  }
  dbg('fallGroup('+groupIndex+') 开始 → 二阶段: 收拢 → 回落');
  isAnimating=true;
  updateDebug();

  const wasRotating=controls.autoRotate;
  controls.autoRotate=false;

  titleBar.classList.add('hide');

  const group=groups[groupIndex];
  const data=groupData[groupIndex];

  // 先记录所有mesh子节点当前的位置
  const meshStartPositions=data.meshChildren.map(mc=>({object:mc.object, pos:mc.object.position.clone()}));

  const phase1Duration=450;  // Mesh收拢
  const phase2Duration=550;  // Group回落
  const totalDuration=phase1Duration+phase2Duration;
  const startTime=performance.now();
  const startGPos=group.position.clone();
  const startGScale=new THREE.Vector3(group.scale.x,group.scale.y,group.scale.z);

  function tick(){
    const elapsed=performance.now()-startTime;
    const t=Math.min(elapsed/totalDuration,1);

    if(elapsed <= phase1Duration){
      // 阶段1：子Mesh收拢归位
      const p1=elapsed/phase1Duration;
      const eased=p1*p1*p1;
      data.meshChildren.forEach((mc,i)=>{
        mc.object.position.lerpVectors(meshStartPositions[i].pos, mc.origPos, eased);
      });
      tip.textContent='第'+(groupIndex+1)+'组收拢中...';
    } else {
      // 阶段2：Group回落
      const p2=(elapsed-phase1Duration)/phase2Duration;
      const eased=p2*p2*p2;
      group.position.lerpVectors(startGPos, data.origPos, eased);
      group.scale.lerpVectors(startGScale, data.origScale, eased);
      tip.textContent='第'+(groupIndex+1)+'组回落中...';
    }

    if(t<1){
      requestAnimationFrame(tick);
    }else{
      dbg('fallGroup('+groupIndex+') 完成');
      // 精确归位
      group.position.copy(data.origPos);
      group.scale.copy(data.origScale);
      group.quaternion.setFromEuler(data.origRot);
      data.meshChildren.forEach(mc=>{mc.object.position.copy(mc.origPos);});

      risenIndex=-1;
      nextRiseIndex=groupIndex+1;

      isAnimating=false;
      updateUI();
      updateDebug();
      controls.autoRotate=wasRotating;
      titleBar.classList.remove('hide');

      if(nextRiseIndex>=3){
        tip.textContent='全部完成！点击屏幕重新开始';
        isAllDone=true;
        [...progress.children].forEach(d=>d.className='dot done');
      }else{
        tip.textContent='点击屏幕：升起第'+(nextRiseIndex+1)+'组';
      }
    }
  }
  tick();
}

function resetAll(){
  dbg('resetAll 重置所有状态');
  isAllDone=false;
  nextRiseIndex=0;
  risenIndex=-1;
  isAnimating=false;

  // 恢复所有组的位置、缩放、旋转 — 以及子Mesh位置
  groups.forEach((group,i)=>{
    const data=groupData[i];
    group.position.copy(data.origPos);
    group.scale.copy(data.origScale);
    group.quaternion.setFromEuler(data.origRot);
    data.meshChildren.forEach(mc=>mc.object.position.copy(mc.origPos));
  });

  updateUI();
  updateDebug();
  tip.textContent='点击屏幕：升起第1组';
}

function updateUI(){
  const stepNum=Math.min((risenIndex>=0?risenIndex:nextRiseIndex)+1, 3);
  titleSub.textContent='第 '+stepNum+' / 3 步';

  [...progress.children].forEach((d,i)=>{
    if(isAllDone){ d.className='dot done'; return; }
    if(i < nextRiseIndex) d.className='dot done';
    else if(i === nextRiseIndex) d.className='dot active';
    else d.className='dot';
  });
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
