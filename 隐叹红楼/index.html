<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>隐叹红楼</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:#2a2a2a;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
  #canvas{display:block;width:100%;height:100%;touch-action:none}
  .title-bar{position:absolute;top:0;left:0;right:0;padding:18px 22px 30px;
    background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);color:#fff;pointer-events:none;z-index:5;
    transition:opacity .3s ease}
  .title-bar.hide{opacity:0}
  .title-main{font-size:26px;font-weight:600;letter-spacing:1px}
  .title-sub{font-size:15px;opacity:.75;margin-top:6px;letter-spacing:1px}
  .scene-name{margin-top:14px;text-align:center;color:#fff;font-size:32px;
    font-weight:600;letter-spacing:10px;padding-left:10px;
    text-shadow:0 2px 14px rgba(0,0,0,.65);pointer-events:none;
    opacity:0;transform:translateY(-10px);
    transition:opacity .7s ease, transform .7s ease}
  .scene-name.show{opacity:1;transform:translateY(0)}
  .scene-name.pulse{animation:scenePulse 1.2s ease}
  @keyframes scenePulse{
    0%{transform:translateY(0) scale(1)}
    30%{transform:translateY(0) scale(1.08)}
    100%{transform:translateY(0) scale(1)}
  }
  .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:18px 22px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;z-index:5;text-align:center}
  .tip{font-size:14px;opacity:.95}
  .controls{position:absolute;top:16px;right:14px;z-index:6;display:flex;gap:10px}
  .btn{width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.18);
    color:#fff;backdrop-filter:blur(6px);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .btn:active{background:rgba(255,255,255,.32)}
  .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#fff;z-index:10;text-align:center;transition:opacity .4s}
  .loading.hide{opacity:0;pointer-events:none}
  .loading .bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:12px;overflow:hidden}
  .loading .bar-fill{height:100%;width:0%;background:#ffd24a;border-radius:2px;transition:width .3s}
  .loading .txt{font-size:14px;opacity:.85}
  .enter-mask{position:absolute;inset:0;z-index:20;background:#2a2a2a;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;
    transition:opacity .6s}
  .enter-mask.hide{opacity:0;pointer-events:none}
  .enter-mask .play{width:80px;height:80px;border-radius:50%;
    border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;
    justify-content:center;font-size:30px;padding-left:6px;margin:0 auto}
  .enter-mask .label{margin-top:18px;font-size:15px;opacity:.8;text-align:center}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="title-bar" id="titleBar">
  <div class="title-main">隐叹红楼</div>
  <div class="title-sub" id="titleSub">"大观园"空间概念转译</div>
  <div class="scene-name" id="sceneName"></div>
</div>
<div class="controls">
  <button class="btn" id="muteBtn" title="音乐开关">&#128266;</button>
</div>
<div class="bottom-bar">
  <div class="tip" id="tip">点击屏幕展开 / 收回 / 抬升各部件</div>
</div>

<div class="loading" id="loading">
  <div class="txt" id="loadTxt">加载中...</div>
  <div class="bar"><div class="bar-fill" id="barFill"></div></div>
</div>

<div class="enter-mask" id="enterMask" style="display:none">
  <div>
    <div class="play">&#9654;</div>
    <div class="label">点击进入</div>
  </div>
</div>

<audio id="bgm" loop preload="auto" src="红楼2.mp3"></audio>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const titleBar=document.getElementById('titleBar'),
      titleSub=document.getElementById('titleSub'),
      sceneName=document.getElementById('sceneName'),
      tip=document.getElementById('tip'),
      loading=document.getElementById('loading'),
      loadTxt=document.getElementById('loadTxt'),
      barFill=document.getElementById('barFill'),
      enterMask=document.getElementById('enterMask'),
      muteBtn=document.getElementById('muteBtn'),
      bgm=document.getElementById('bgm');

const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x2a2a2a);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.shadowMap.radius=8;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.75;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100000);

const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const dirLight=new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.bias=-0.0005;
dirLight.shadow.radius=12;
dirLight.shadow.blurSamples=25;
scene.add(dirLight);
scene.add(dirLight.target);

const ambLight=new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambLight);

// ── 控制器 ──
const controls=new OrbitControls(camera, canvas);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.autoRotate=true;
controls.autoRotateSpeed=0.5;
controls.enablePan=true;
controls.screenSpacePanning=true;
controls.panSpeed=1.2;
controls.minDistance=0.5;
controls.maxDistance=5000;

// ── 加载管理器 ──
const loadingManager=new THREE.LoadingManager();
loadingManager.onProgress=(url, loaded, total)=>{
  const pct=Math.round(loaded/total*100);
  barFill.style.width=pct+'%';
  loadTxt.textContent='加载中 '+pct+'%';
};

// ── 抬升参数（基于模型 Y 方向尺寸 ~1.8，整体为扁平横向布局）──
const RED_LIFT   = 3.0;   // 红色材质：最上
const GRAY_LIFT  = 1.5;   // 灰色材质：中间
const RISE_HEIGHT= 4.5;   // 模型1~7 整体抬升高度

// ── 加载模型 ──
const loader=new GLTFLoader(loadingManager);
let model=null;
let colorNodes=[];      // [{node, cat:'RED'|'GRAY', origY}]
let modelGroups=[];     // 模型1~7 (index 0..6)

// ── 点击序列状态机 ──
// 进入后自动播放「按色彩展开」。之后点击推进：
//   actionIndex=0  -> 收回（颜色）
//   1..14          -> 模型1~7 依次 上升(奇)/落回(偶)
//   15             -> 动画结束
let actionIndex=0;
let colorExpanded=false;
let entered=false;
let isAnimating=false;
let wasRotating=false;

// ── 多目标 Tween 系统 ──
let activeTweens=[];
let tweenOnComplete=null;

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

function tweenMany(items, duration, onComplete){
  activeTweens=[];
  for(const it of items){
    activeTweens.push({
      target: it.target,
      propName: it.propName,
      startVal: (it.startVal!==undefined ? it.startVal : it.target[it.propName]),
      endVal: it.endVal,
      duration, elapsed:0
    });
  }
  tweenOnComplete=onComplete;
  isAnimating=true;
}

function updateTweens(delta){
  if(activeTweens.length===0) return;
  let allDone=true;
  for(const tw of activeTweens){
    tw.elapsed += delta;
    let t=tw.elapsed/tw.duration; if(t>=1) t=1;
    const e=easeInOutCubic(t);
    tw.target[tw.propName]=tw.startVal + (tw.endVal-tw.startVal)*e;
    if(t<1) allDone=false;
  }
  if(allDone){
    const cb=tweenOnComplete;
    activeTweens=[]; tweenOnComplete=null;
    isAnimating=false;
    if(cb) cb();
  }
}

async function init(){
  const gltf=await loader.loadAsync('models/Model.glb');
  model=gltf.scene;

  // --- 修复玻璃/透明材质 + 强制双面 ---
  let glassCount=0, dsCount=0;
  model.traverse(child=>{
    if(!child.isMesh) return;
    child.castShadow=true;
    child.receiveShadow=true;
    const mat=child.material;
    if(!mat) return;
    const mats=Array.isArray(mat)?mat:[mat];
    mats.forEach(m=>{
      if(!m.doubleSided){ m.doubleSided=true; m.needsUpdate=true; dsCount++; }
      // 降低环境反射强度，柔化高光
      if(m.envMapIntensity!==undefined) m.envMapIntensity=0.25;
      if(m.isMeshStandardMaterial || m.isMeshPhysicalMaterial){
        if(m.roughness!==undefined && m.roughness<0.5) m.roughness=0.5;
        if(m.metalness!==undefined) m.metalness=Math.min(m.metalness, 0.3);
        m.needsUpdate=true;
      }
      const name=(m.name||'').toLowerCase();
      const isGlass=name.includes('glass')||name.includes('透明')||
                     name.includes('玻璃')||name.includes('window')||
                     name.includes('win_')||name.includes('transp');
      const isWater=name.includes('water');
      if(m.isMeshPhysicalMaterial&&m.transmission>0){
        m.transparent=true; m.opacity=Math.min(m.opacity||1,0.35);
        m.depthWrite=false; m.needsUpdate=true; glassCount++;
      }else if(isWater){
        m.transparent=true; m.depthWrite=false; m.needsUpdate=true; glassCount++;
      }else if(isGlass||(m.opacity<1&&m.opacity>0)){
        if(!isGlass&&m.opacity>=0.95) return;
        m.transparent=true; if(m.opacity>=0.9) m.opacity=0.3;
        m.depthWrite=false; m.needsUpdate=true; glassCount++;
      }
    });
  });
  if(glassCount>0) console.log('✅ 共处理',glassCount,'个玻璃/水材质');
  if(dsCount>0) console.log('✅ 已修复',dsCount,'个材质为双面渲染');

  // --- 为白色模型生成边缘线 ---
  model.traverse(child=>{
    if(!child.isMesh) return;
    const mat=child.material;
    if(!mat || Array.isArray(mat)) return;
    const col=mat.color;
    if(col && col.getHex()===0xffffff){
      const edges=new THREE.EdgesGeometry(child.geometry, 20);
      const lineMat=new THREE.LineBasicMaterial({color:0x666666, transparent:true, opacity:0.6});
      const edgeLines=new THREE.LineSegments(edges, lineMat);
      edgeLines.raycast=()=>{};
      child.add(edgeLines);
    }
  });

  // --- 收集彩色部件（红/灰）---
  model.traverse(child=>{
    if(!child.isMesh) return;
    const m=child.material;
    if(!m) return;
    const mname=(m.name||'');
    if(mname==='Color_L05')      colorNodes.push({node:child, cat:'RED',  origY:child.position.y});
    else if(mname==='Color_M03') colorNodes.push({node:child, cat:'GRAY', origY:child.position.y});
  });
  console.log('彩色部件数:', colorNodes.length, '(红/灰)');

  // --- 收集 模型1~7 分组 ---
  let modelRoot=null;
  model.children.forEach(c=>{ if(c.name==='Model') modelRoot=c; });
  const rootForGroups=modelRoot||model;
  for(let g=1; g<=7; g++){
    let found=null;
    rootForGroups.children.forEach(c=>{ if(c.name===String(g)) found=c; });
    if(!found) model.traverse(c=>{ if(!found && c.name===String(g)) found=c; });
    if(found) found.userData.origY=found.position.y;
    modelGroups.push(found);
  }
  console.log('模型分组:', modelGroups.map(g=>g?g.name:'?').join(','));

  scene.add(model);
  setupCamera(model);

  loading.classList.add('hide');
  enterMask.style.display='flex';
  animate();
}
init().catch(err=>{ loadTxt.textContent='加载失败：'+err.message; console.error(err); });

function setupCamera(model){
  const box=new THREE.Box3().setFromObject(model);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const maxDim=Math.max(size.x, size.y, size.z);
  const fov=camera.fov*Math.PI/180;
  const dist=(maxDim/2)/Math.tan(fov/2)*1.4;
  camera.position.set(center.x+dist*0.15, center.y+dist*0.5, center.z+dist);
  camera.lookAt(center);
  camera.near=maxDim*0.001; camera.far=maxDim*1000;
  camera.updateProjectionMatrix();
  controls.target.copy(center);
  controls.minDistance=maxDim*0.05;
  controls.maxDistance=dist*8;
  controls.update();

  dirLight.position.set(center.x+size.x*0.8, center.y+size.y*1.5, center.z+size.z*0.6);
  dirLight.target.position.copy(center);
  dirLight.shadow.camera.left=-maxDim; dirLight.shadow.camera.right=maxDim;
  dirLight.shadow.camera.top=maxDim; dirLight.shadow.camera.bottom=-maxDim;
  dirLight.shadow.camera.near=0.1; dirLight.shadow.camera.far=maxDim*5;
  dirLight.shadow.camera.updateProjectionMatrix();

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(maxDim*10, maxDim*10),
    new THREE.ShadowMaterial({ opacity:0.22 })
  );
  ground.rotation.x=-Math.PI/2;
  ground.position.y=box.min.y;
  ground.receiveShadow=true;
  scene.add(ground);

  const bottomLight=new THREE.DirectionalLight(0xffffff, 0.35);
  bottomLight.position.set(center.x, center.y-size.y*0.5, center.z);
  bottomLight.target.position.copy(center);
  scene.add(bottomLight);
  scene.add(bottomLight.target);
}

// ── 动画循环 ──
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const delta=clock.getDelta();
  updateTweens(delta);
  controls.update();
  renderer.render(scene, camera);
}

// ── 模型1~7 场景标题 ──
const sceneNames=['入园','行乐','叹残荷','登台','品茶','枕石','出园'];
function showSceneName(groupIdx){
  sceneName.textContent=sceneNames[groupIdx]||'';
  sceneName.classList.add('show');
  sceneName.classList.remove('pulse');
  void sceneName.offsetWidth;   // 重置动画
  sceneName.classList.add('pulse');
}
function hideSceneName(){
  sceneName.classList.remove('show','pulse');
}

// ── 动画动作 ──
function expandColor(){
  hideSceneName();   // 色彩展开阶段不显示场景标题
  const items=[];
  for(const cn of colorNodes){
    const lift=cn.cat==='RED'?RED_LIFT:GRAY_LIFT;
    items.push({target:cn.node.position, propName:'y', startVal:cn.origY, endVal:cn.origY+lift});
  }
  tweenMany(items, 1.4, ()=>{
    colorExpanded=true; actionIndex=0;
    tip.textContent='点击屏幕：收回';
    controls.autoRotate=wasRotating;
  });
  tip.textContent='展开中…';
}

function retractColor(){
  const items=[];
  for(const cn of colorNodes){
    items.push({target:cn.node.position, propName:'y', startVal:cn.node.position.y, endVal:cn.origY});
  }
  tweenMany(items, 1.0, ()=>{
    actionIndex=1;
    tip.textContent='点击屏幕：模型1 上升';
    controls.autoRotate=wasRotating;
  });
  tip.textContent='收回中…';
}

function riseGroup(g){
  const grp=modelGroups[g];
  if(!grp){ actionIndex++; return; }
  showSceneName(g);   // 显示对应场景标题
  const items=[{target:grp.position, propName:'y', startVal:grp.userData.origY, endVal:grp.userData.origY+RISE_HEIGHT}];
  tweenMany(items, 1.2, ()=>{
    actionIndex++;
    tip.textContent='模型'+(g+1)+' 已上升，点击落回';
    controls.autoRotate=wasRotating;
  });
  tip.textContent='模型'+(g+1)+' 上升中…';
}

function lowerGroup(g){
  const grp=modelGroups[g];
  if(!grp){ actionIndex++; return; }
  const items=[{target:grp.position, propName:'y', startVal:grp.position.y, endVal:grp.userData.origY}];
  tweenMany(items, 1.2, ()=>{
    actionIndex++;
    if(actionIndex>14) tip.textContent='动画结束';
    else tip.textContent='模型'+(g+1)+' 已落回，点击模型'+(g+2)+' 上升';
    controls.autoRotate=wasRotating;
  });
  tip.textContent='模型'+(g+1)+' 落回中…';
}

// ── 点击进入 ──
enterMask.addEventListener('click',()=>{
  enterMask.classList.add('hide');
  entered=true;
  bgm.volume=0.4;
  bgm.play().catch(()=>{});
  wasRotating=controls.autoRotate;
  controls.autoRotate=false;
  expandColor();   // 进入后自动播放「按色彩展开」
});

// ── 从头开始：复位所有部件并重播展开动画 ──
function restart(){
  for(const cn of colorNodes){ cn.node.position.y=cn.origY; }
  for(const g of modelGroups){ if(g) g.position.y=g.userData.origY; }
  actionIndex=0;
  colorExpanded=false;
  tip.textContent='点击屏幕：收回';
  expandColor();
}

// ── 点击序列处理 ──
function handleClick(){
  if(!entered || isAnimating) return;

  wasRotating=controls.autoRotate;
  controls.autoRotate=false;

  const a=actionIndex;
  if(a===0){
    retractColor();
  }else if(a>=1 && a<=14){
    const g=Math.floor((a-1)/2);   // 0..6
    const rising=((a-1)%2===0);
    if(rising) riseGroup(g); else lowerGroup(g);
  }else if(a>=15){
    // 动画结束 → 点击从头开始
    restart();
  }
}

// ── 点击检测 ──
let downX=0, downY=0, downT=0;
canvas.addEventListener('pointerdown', e=>{
  downX=e.clientX; downY=e.clientY; downT=Date.now();
});
canvas.addEventListener('pointerup', e=>{
  const dx=Math.abs(e.clientX-downX);
  const dy=Math.abs(e.clientY-downY);
  const dt=Date.now()-downT;
  if(dx<12 && dy<12 && dt<800){
    handleClick();
  }
});

muteBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(bgm.paused){ bgm.play().catch(()=>{}); muteBtn.textContent='\u{1F50A}'; }
  else{ bgm.pause(); muteBtn.textContent='\u{1F507}'; }
});

window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
